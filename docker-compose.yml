services:
  opencode-router:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/config.json:ro
    environment:
      - OPENCODE_KEYS=${OPENCODE_KEYS}
    restart: unless-stopped
    networks:
      - routers
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - routers
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - routers
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  routers:
    name: smart-routers
    external: true

volumes:
  grafana-storage: